        header {
            background-color: #5e3b8f;

        .game-card {

            border-radius: 10px;
            cursor: pointer;

            text-align: center;
        }

        .game-card img {
            width: 100%;
            height: 160px;
            border-radius: 10px 10px 0 0;
        }

        .game-card h3 {
            margin-top: 10px;
        }

        footer {
            background-color: #5e3b8f;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        iframe.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1000;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background: red;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
    </style>

    <script>
        function openFullscreen(url) {
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'fullscreen';
            iframe.setAttribute('allowfullscreen', '');

            const closeBtn = document.createElement('button');
            closeBtn.innerText = "Close";
            closeBtn.className = "close-btn";

            closeBtn.onclick = () => {
                iframe.remove();
                closeBtn.remove();
            };

            document.body.appendChild(iframe);
            document.body.appendChild(closeBtn);
        }
    </script>
</head>
